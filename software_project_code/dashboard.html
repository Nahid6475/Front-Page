<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoMind - ড্যাশবোর্ড</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* dashboard specific */
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 30px 20px;
        }
        .dashboard-main {
            max-width: 1300px;
            margin: 0 auto;
        }
        .back-home {
            display: inline-block;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
        .dashboard-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }
        .chart-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .stat-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
        }
        .stat-info h3 {
            font-size: 28px;
            color: #1e2a5e;
        }
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2,1fr); }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="dashboard-main">
    <a href="index.html" class="back-home">← হোমপেজে ফিরুন</a>
    
    <div class="dashboard-card">
        <h2 style="margin-bottom: 20px;">📊 MemoMind অ্যানালিটিক্স ড্যাশবোর্ড</h2>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">📝</div><div class="stat-info"><h3 id="statMemories">0</h3><p>মোট মেমরি</p></div></div>
            <div class="stat-card"><div class="stat-icon">💬</div><div class="stat-info"><h3 id="statConv">0</h3><p>মোট কথোপকথন</p></div></div>
            <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-info"><h3 id="statStreak">0</h3><p>দিনের স্ট্রিক</p></div></div>
            <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-info"><h3 id="statAvg">0</h3><p>সাপ্তাহিক গড়</p></div></div>
        </div>
        <div class="charts-grid">
            <div class="chart-card"><h4>📅 গত ৭ দিনের কার্যকলাপ</h4><canvas id="weeklyChart"></canvas></div>
            <div class="chart-card"><h4>🎯 Intent ডিস্ট্রিবিউশন</h4><canvas id="intentChart"></canvas></div>
            <div class="chart-card"><h4>🔝 জনপ্রিয় কীওয়ার্ড</h4><canvas id="keywordsChart"></canvas></div>
            <div class="chart-card"><h4>⏰ ঘন্টাভিত্তিক কার্যকলাপ</h4><canvas id="hourlyChart"></canvas></div>
        </div>
    </div>
</div>
<script src="script.js"></script>
<script>
    // dashboard specific load
    window.addEventListener('DOMContentLoaded', () => {
        if(typeof updateDashboardStats === 'function') updateDashboardStats();
        if(typeof renderCharts === 'function') renderCharts();
        else console.warn("wait for script");
    });
</script>
</body>
</html>
